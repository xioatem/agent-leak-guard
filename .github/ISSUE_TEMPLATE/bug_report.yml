name: Bug report
about: Report a defect in agent-leak-guard
title: "[Bug] "
labels: bug
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Describe the bug
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / Shell
    validations:
      required: true
